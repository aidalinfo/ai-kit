services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: world
      POSTGRES_PASSWORD: world
      POSTGRES_DB: world
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U world -d world"]
      interval: 2s
      timeout: 3s
      retries: 30
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 2s
      timeout: 3s
      retries: 30
